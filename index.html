<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品展示</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <h1>产品展示</h1>
                <div class="language-switcher">
                    <button data-lang="zh">中文</button>
                    <button data-lang="en">English</button>
                    <button data-lang="ko">한국어</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="carousel">
            <div class="carousel-container">
                <div class="carousel-item active">
                    <img src="img1-50/1.png" alt="轮播图1" data-src="img1-50/1.png">
                </div>
                <div class="carousel-item">
                    <img src="img1-50/2.png" alt="轮播图2" data-src="img1-50/2.png">
                </div>
                <div class="carousel-item">
                    <img src="img1-50/3.png" alt="轮播图3" data-src="img1-50/3.png">
                </div>
            </div>
            <button class="carousel-prev">‹</button>
            <button class="carousel-next">›</button>
        </section>

        <section class="product-search">
            <div id="product-search"></div>
        </section>

        <section class="products-section">
            <div class="container">
                <h2 id="products-title">产品系列</h2>
                <div id="product-series" class="product-series-container">
                </div>
            </div>
        </section>

        <section class="contact-section">
            <div class="container">
                <div id="contact-section"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3 id="about-us">关于我们</h3>
                    <p id="about-text">我们提供高品质的产品，满足您的需求。</p>
                </div>
                <div class="footer-section">
                    <h3 id="contact-us">联系方式</h3>
                    <p id="contact-text">电话：123-456-7890</p>
                    <p id="email-text">邮箱：info@example.com</p>
                </div>
                <div class="footer-section">
                    <h3 id="social-media">社交媒体</h3>
                    <div class="social-links">
                        <a href="#" id="wechat-link">微信</a>
                        <a href="#" id="weibo-link">微博</a>
                        <a href="#" id="instagram-link">Instagram</a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p id="copyright">© 2026 产品展示. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script src="js/cache-manager.js"></script>
    <script src="js/github-api.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/lazy-load.js"></script>
    <script src="js/error-handler.js"></script>
    <script src="js/contact-form.js"></script>
    <script src="js/product-modal.js"></script>
    <script src="js/product-search.js"></script>
    <script src="js/frontend.js"></script>
</body>
</html>
