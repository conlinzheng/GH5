<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GH5 产品展示网站">
  <meta name="keywords" content="产品展示,产品对比,多语言">
  <title>GH5 - 产品展示</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <h1>GH5</h1>
        </div>
        <nav class="nav">
          <button class="nav-btn" id="refresh-data" aria-label="刷新数据" title="刷新数据">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 10a6 6 0 0 1 6-6h4m0 0l-3-3m3 3l-3 3m3 9a6 6 0 0 1-6 6H6m0 0l3 3m-3-3l3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="nav-btn" id="history-toggle" aria-label="浏览历史" title="浏览历史">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="nav-btn" id="language-toggle" aria-label="切换语言">
            <span class="lang-text">ZH</span>
          </button>
        </nav>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <section class="carousel-section" id="carousel">
        <div class="carousel-container">
          <div class="carousel-track" id="carousel-track">
            <div class="carousel-slide">
              <div class="carousel-content">
                <h2 class="carousel-title" id="carousel-title">欢迎来到 GH5</h2>
                <p class="carousel-description" id="carousel-description">探索我们的优质产品</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="search-section" id="search-section">
        <div class="search-container">
          <div class="search-input-wrapper">
            <input type="text" class="search-input" id="search-input" placeholder="搜索产品名称、标签...">
            <button class="search-clear-btn" id="search-clear" aria-label="清除搜索" style="display: none;">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <button class="search-btn" id="search-btn" aria-label="搜索">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM19 19l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </section>

      <section class="products-section" id="products-section">
        <div class="products-container" id="products-container">
          <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>加载中...</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- 联系我们弹窗 -->
  <div class="contact-modal" id="contact-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="contact-modal-overlay" id="contact-modal-overlay"></div>
    <div class="contact-modal-content">
      <button class="contact-modal-close" id="contact-modal-close" aria-label="关闭">&times;</button>
      
      <div class="contact-modal-body">
        <div class="contact-modal-left">
          <h2 class="contact-company-name" id="contact-company-name">关于我们</h2>
          <div class="contact-company-info">
            <div class="contact-info-item" id="contact-description-item">
              <span class="contact-info-icon">📝</span>
              <span class="contact-info-text" id="contact-company-description"></span>
            </div>
            <div class="contact-info-item" id="contact-address-item" style="display: none;">
              <span class="contact-info-icon">📍</span>
              <span class="contact-info-text" id="contact-company-address"></span>
            </div>
            <div class="contact-info-item" id="contact-phone-item" style="display: none;">
              <span class="contact-info-icon">📞</span>
              <span class="contact-info-text" id="contact-company-phone"></span>
            </div>
            <div class="contact-info-item" id="contact-email-item" style="display: none;">
              <span class="contact-info-icon">✉️</span>
              <span class="contact-info-text" id="contact-company-email"></span>
            </div>
            <div class="contact-info-item" id="contact-wechat-item" style="display: none;">
              <span class="contact-info-icon">💬</span>
              <span class="contact-info-text" id="contact-company-wechat"></span>
            </div>
            <div class="contact-info-item" id="contact-hours-item" style="display: none;">
              <span class="contact-info-icon">🕐</span>
              <span class="contact-info-text" id="contact-working-hours"></span>
            </div>
          </div>
        </div>
        
        <div class="contact-modal-right">
          <h3 class="contact-form-title" id="contact-form-title">联系我们</h3>
          <form class="contact-form" id="contact-form">
            <div class="form-group">
              <label for="name" class="form-label" id="label-name">姓名</label>
              <input type="text" id="name" name="name" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="email" class="form-label" id="label-email">邮箱</label>
              <input type="email" id="email" name="email" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="message" class="form-label" id="label-message">留言</label>
              <textarea id="message" name="message" class="form-textarea" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" id="submit-btn" data-text-submit="提交" data-text-submitting="提交中...">提交</button>
          </form>
          <div id="form-message" class="form-message" style="display: none;"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-social-links" id="footer-social-links"></div>
        <button class="footer-contact-btn" id="footer-contact-btn" onclick="openContactModal()">
          联系我们
        </button>
        <p class="footer-text" id="footer-text">&copy; 2026 GH5. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- 产品详情弹窗 -->
  <div class="product-modal" id="product-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close" aria-label="关闭">&times;</button>
      
      <div class="modal-body">
        <!-- 左侧图片 -->
        <div class="modal-images">
          <div class="main-image-container">
            <img id="modal-main-image" src="" alt="" onclick="openLightbox(this.src)">
            <div class="zoom-hint">点击查看大图</div>
          </div>
          <div class="modal-gallery-container">
            <button class="gallery-nav gallery-nav-left" onclick="navigateGallery(-1)" aria-label="上一张">&lt;</button>
            <div class="modal-gallery" id="modal-gallery">
              <!-- 相关图片将动态加载 -->
            </div>
            <button class="gallery-nav gallery-nav-right" onclick="navigateGallery(1)" aria-label="下一张">&gt;</button>
          </div>
        </div>

        <!-- 右侧信息 -->
        <div class="modal-info">
          <div class="modal-series" id="modal-series"></div>
          <h2 id="modal-product-name"></h2>
          <p class="modal-description" id="modal-description"></p>
          
          <!-- 产品详细信息 -->
          <div class="product-specs">
            <div class="spec-item">
              <span class="spec-label">鞋面材质：</span>
              <span class="spec-value" id="spec-upper"></span>
            </div>
            <div class="spec-item">
              <span class="spec-label">内里材质：</span>
              <span class="spec-value" id="spec-inner"></span>
            </div>
            <div class="spec-item">
              <span class="spec-label">鞋底材质：</span>
              <span class="spec-value" id="spec-sole"></span>
            </div>
            <div class="spec-item">
              <span class="spec-label">是否支持定制：</span>
              <span class="spec-value" id="spec-customizable"></span>
            </div>
            <div class="spec-item">
              <span class="spec-label">起订量：</span>
              <span class="spec-value" id="spec-min-order"></span>
            </div>
            <div class="spec-item">
              <span class="spec-label">价格：</span>
              <span class="spec-value" id="spec-price"></span>
            </div>
          </div>
          
          <div class="modal-actions">
            <button class="contact-btn" onclick="openContactModal()">
              联系我们
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 大图查看器 -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-content" onclick="event.stopPropagation()">
      <span class="close-lightbox" onclick="closeLightbox(event)">&times;</span>
      <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)" title="上一张">❮</button>
      <img class="lightbox-image" id="lightbox-image" src="" alt="">
      <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)" title="下一张">❯</button>
      <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>
  </div>

  <!-- 浏览历史弹出窗口 -->
  <div class="history-sidebar" id="history-sidebar">
    <div class="history-sidebar-header">
      <h3>浏览历史</h3>
      <button class="history-close-btn" id="history-close-btn">&times;</button>
    </div>
    <div class="history-sidebar-content">
      <div id="history-widget" class="history-widget">
        <!-- 浏览历史内容将通过 JavaScript 动态生成 -->
      </div>
    </div>
  </div>
  <div class="history-overlay" id="history-overlay"></div>

  <script src="js/config.js"></script>
  <script src="js/error-handler.js"></script>
  <script src="js/cache-manager.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/frontend-core.js"></script>
  <script src="js/frontend-ui.js"></script>
  <script src="js/frontend-events.js"></script>
  <script src="js/frontend.js"></script>
  <script src="js/browse-history.js"></script>
  <script>
    function openContactModal() {
      if (typeof frontendUI !== 'undefined') {
        frontendUI.openContactModal();
      }
    }
    
    function closeContactModal() {
      if (typeof frontendUI !== 'undefined') {
        frontendUI.closeContactModal();
      }
    }
  </script>
</body>
</html>
