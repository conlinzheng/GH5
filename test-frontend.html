<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>前端测试</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .test-result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
    .success { background-color: #d4edda; border-color: #c3e6cb; }
    .error { background-color: #f8d7da; border-color: #f5c6cb; }
    .warning { background-color: #fff3cd; border-color: #ffeeba; }
  </style>
</head>
<body>
  <h1>前端功能测试</h1>
  <div id="test-results"></div>
  
  <script src="js/config.js"></script>
  <script src="js/error-handler.js"></script>
  <script src="js/cache-manager.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/frontend.js"></script>
  <script>
    const resultsContainer = document.getElementById('test-results');
    
    function addResult(message, type = 'success') {
      const div = document.createElement('div');
      div.className = `test-result ${type}`;
      div.textContent = message;
      resultsContainer.appendChild(div);
    }
    
    async function testFrontend() {
      addResult('开始测试前端功能...', 'success');
      
      try {
        // 检查 Frontend 类是否初始化
        if (typeof frontend === 'undefined') {
          addResult('Frontend 类未初始化', 'error');
          return;
        }
        addResult('Frontend 类已初始化', 'success');
        
        // 检查状态
        if (frontend.state) {
          addResult('Frontend 状态对象存在', 'success');
          addResult(`产品数量: ${frontend.state.products.length}`, frontend.state.products.length > 0 ? 'success' : 'warning');
          addResult(`系列数量: ${frontend.state.series.length}`, frontend.state.series.length > 0 ? 'success' : 'warning');
          addResult(`系列名称映射: ${Object.keys(frontend.state.seriesNameMap).length} 个`, Object.keys(frontend.state.seriesNameMap).length > 0 ? 'success' : 'warning');
        } else {
          addResult('Frontend 状态对象不存在', 'error');
        }
        
        // 检查配置
        if (frontend.state.siteConfig) {
          addResult('站点配置已加载', 'success');
        } else {
          addResult('站点配置未加载', 'warning');
        }
        
        // 检查 DOM 元素
        const productsContainer = document.getElementById('products-container');
        if (productsContainer) {
          addResult('products-container 元素存在', 'success');
          addResult(`容器内容: ${productsContainer.innerHTML.length > 0 ? '有内容' : '为空'}`, productsContainer.innerHTML.length > 0 ? 'success' : 'warning');
        } else {
          addResult('products-container 元素不存在', 'error');
        }
        
        // 测试渲染
        addResult('测试产品渲染...', 'success');
        frontend.renderProducts();
        
        setTimeout(() => {
          const container = document.getElementById('products-container');
          if (container && container.innerHTML.length > 0) {
            addResult('产品渲染成功', 'success');
          } else {
            addResult('产品渲染失败 - 容器为空', 'error');
          }
        }, 1000);
        
      } catch (error) {
        addResult(`测试失败: ${error.message}`, 'error');
        console.error('Frontend test error:', error);
      }
    }
    
    // 等待页面加载完成后测试
    window.addEventListener('load', () => {
      setTimeout(testFrontend, 2000);
    });
  </script>
</body>
</html>
